name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-lint-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm lint

      - run: pnpm test

  smoke-tests:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xvfb openbox x11-utils scrot xdotool wmctrl xterm chromium-browser

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Run smoke tests (non-blocking)
        run: |
          set +e
          pnpm smoke:x11           || echo "smoke:x11 SKIPPED"
          pnpm smoke:http          || echo "smoke:http SKIPPED"
          pnpm smoke:mcp           || echo "smoke:mcp SKIPPED"
          pnpm smoke:vite:http     || echo "smoke:vite:http SKIPPED"
          pnpm smoke:vite:mcp      || echo "smoke:vite:mcp SKIPPED"
          pnpm smoke:browser-semantic || echo "smoke:browser-semantic SKIPPED"
          pnpm smoke:driver-router || echo "smoke:driver-router SKIPPED"
          pnpm smoke:visual-qa     || echo "smoke:visual-qa SKIPPED"
          pnpm smoke:visual-baseline || echo "smoke:visual-baseline SKIPPED"
          pnpm smoke:annotation-repair || echo "smoke:annotation-repair SKIPPED"
          echo "Smoke suite finished."
