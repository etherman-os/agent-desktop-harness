name: Feature request
description: Suggest a new capability or improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: What workflow should this improve?
    validations:
      required: true
  - type: textarea
    id: proposed_behavior
    attributes:
      label: Proposed behavior
      description: What should Agent Desktop Harness do?
    validations:
      required: true
  - type: checkboxes
    id: interface
    attributes:
      label: Interface affected
      options:
        - label: Core
        - label: CLI
        - label: HTTP
        - label: MCP
        - label: Docs
  - type: textarea
    id: safety
    attributes:
      label: Safety considerations
      description: Command execution, desktop control, network access, evidence sensitivity, or other risks.
    validations:
      required: true
